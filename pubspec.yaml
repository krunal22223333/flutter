name: hcp_hrms
description: HCP HRMS - Employee Self Service
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  qr_flutter: ^4.1.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^17.2.3
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  crop_your_image: ^2.0.0
  video_player: ^2.8.6


#dependency_overrides:
  # Pin to a SDK-34 build so file_picker/image_picker don't force compileSdk 36.
 # flutter_plugin_android_lifecycle: 2.0.17

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/icon.png
    - assets/splash.png
    - assets/splash_video.mp4

# Launcher icon (phone home screen) — HCP symbol
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

# Splash screen — HCP symbol on white
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/splash.png
  android: true
  ios: false
  android_12:
    image: assets/splash.png
    color: "#FFFFFF"
